spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.local[.properties]
      - optional:file:../../.env[.properties]
      - optional:file:../../.env.local[.properties]

  profiles:
    active: local

  application:
    name: brickdeck-api

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:brickdeck}
    username: ${POSTGRES_USER:brickdeck}
    password: ${POSTGRES_PASSWORD:brickdeck}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

rebrickable:
  base-url: ${REBRICKABLE_BASE_URL:https://rebrickable.com/api/v3}
  api-key: ${REBRICKABLE_API_KEY:}

brickdeck:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-change-me-brickdeck-jwt-secret-override-in-prod}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}