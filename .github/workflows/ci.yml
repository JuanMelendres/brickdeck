name: CI

on:
  push:
    branches: [develop, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (apps/api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: brickdeck
          POSTGRES_USER: brickdeck
          POSTGRES_PASSWORD: brickdeck
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U brickdeck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: ./mvnw -B clean verify
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: brickdeck
          POSTGRES_USER: brickdeck
          POSTGRES_PASSWORD: brickdeck
          # Tests mock external HTTP; the Rebrickable client bean only needs a
          # non-blank key to instantiate. Dummy value, not a real secret.
          REBRICKABLE_API_KEY: ci-dummy-key
          # The app no longer ships a JWT signing default, so tests must supply one.
          # Must be >= 32 chars. Dummy value, not a real secret.
          JWT_SECRET: ci-dummy-jwt-secret-not-a-real-secret-32plus

  frontend:
    name: Frontend (apps/web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pin to the packageManager version; the float `11` pulled a newer
          # 11.x that fails to parse the lockfile under the Node 24 runner.
          version: 11.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
