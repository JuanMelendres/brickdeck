name: CI

on:
  push:
    branches: [develop, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (apps/api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: brickdeck
          POSTGRES_USER: brickdeck
          POSTGRES_PASSWORD: brickdeck
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U brickdeck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: ./mvnw -B clean verify
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: brickdeck
          POSTGRES_USER: brickdeck
          POSTGRES_PASSWORD: brickdeck
          # Tests mock external HTTP; the Rebrickable client bean only needs a
          # non-blank key to instantiate. Dummy value, not a real secret.
          REBRICKABLE_API_KEY: ci-dummy-key

  frontend:
    name: Frontend (apps/web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
