openapi: 3.0.3
info:
  title: BrickDeck Catalog API
  version: v1
  description: >
    REST API for the BrickDeck LEGO collection platform. This file is a
    hand-maintained summary of the live contract. The authoritative,
    always-current spec is generated by springdoc at runtime:
    GET /v3/api-docs (Swagger UI at /swagger-ui/index.html).
    Regenerate/refresh this file from the running API when endpoints change.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Catalog
  - name: Collection
paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Liveness check
      responses:
        "200": { description: OK }

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { description: Email already registered }
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { description: Invalid credentials }
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
        "401": { description: Missing or invalid token }

  /api/v1/sets:
    get:
      tags: [Catalog]
      summary: List cached sets (paginated)
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
        - { name: sort, in: query, schema: { type: string, default: "externalSetNumber,asc" } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageBrickSetResponse" }
  /api/v1/sets/by-number/{setNumber}:
    get:
      tags: [Catalog]
      summary: Find or import a set by number
      parameters:
        - { name: setNumber, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrickSetResponse" }
        "404": { description: Set not found }
  /api/v1/sets/search:
    get:
      tags: [Catalog]
      summary: Search sets via Rebrickable (paginated)
      parameters:
        - { name: q, in: query, required: true, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageBrickSetResponse" }
  /api/v1/sets/{setNumber}/parts:
    get:
      tags: [Catalog]
      summary: Get a set's parts inventory (paginated)
      parameters:
        - { name: setNumber, in: path, required: true, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageSetPartResponse" }
  /api/v1/catalog/sets/import:
    post:
      tags: [Catalog]
      summary: Import a set by number
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImportSetRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BrickSetResponse" }
  /api/v1/catalog/sets/{setNumber}/inventory/import:
    post:
      tags: [Catalog]
      summary: Import a set's inventory (set must exist locally)
      parameters:
        - { name: setNumber, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InventoryImportResult" }
        "404": { description: Set not imported yet }
  /api/v1/sets/{setNumber}/missing-parts:
    get:
      tags: [Catalog]
      summary: Missing-pieces report for a target set
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: setNumber, in: path, required: true, schema: { type: string } }
        - { name: missingOnly, in: query, schema: { type: boolean, default: false } }
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MissingPartsReport" }
        "401": { description: Unauthorized }
        "404": { description: Set or inventory not imported }

  /api/v1/collection/sets:
    post:
      tags: [Collection]
      summary: Add a set to the collection
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddUserSetRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserSetResponse" }
        "401": { description: Unauthorized }
        "409": { description: Set already in collection }
    get:
      tags: [Collection]
      summary: List collection sets (paginated)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageUserSetResponse" }
  /api/v1/collection/sets/{id}:
    patch:
      tags: [Collection]
      summary: Update a collection set
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserSetRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserSetResponse" }
        "404": { description: Not found or not owned }
    delete:
      tags: [Collection]
      summary: Remove a collection set
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Deleted }
        "404": { description: Not found or not owned }

  /api/v1/collection/parts:
    post:
      tags: [Collection]
      summary: Add a loose part to the collection
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddUserPartRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPartResponse" }
        "401": { description: Unauthorized }
        "404": { description: Part or color not in catalog }
        "409": { description: Part+color already tracked }
    get:
      tags: [Collection]
      summary: List loose parts (paginated)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageUserPartResponse" }
  /api/v1/collection/parts/{id}:
    patch:
      tags: [Collection]
      summary: Update a loose part entry
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserPartRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPartResponse" }
        "404": { description: Not found or not owned }
    delete:
      tags: [Collection]
      summary: Remove a loose part entry
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Deleted }
        "404": { description: Not found or not owned }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ValidationError:
      description: Bean validation failure
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiError" }
  schemas:
    ApiError:
      type: object
      properties:
        status: { type: integer, example: 400 }
        error: { type: string, example: Bad Request }
        message: { type: string, example: Validation failed }
        path: { type: string }
        validationErrors:
          type: object
          additionalProperties: { type: string }
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 100 }
        displayName: { type: string, maxLength: 255 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
    AuthResponse:
      type: object
      properties:
        token: { type: string }
        tokenType: { type: string, example: Bearer }
        user: { $ref: "#/components/schemas/UserResponse" }
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        displayName: { type: string }
        role: { type: string }
        createdAt: { type: string, format: date-time }
    BrickSetResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        externalSetNumber: { type: string }
        name: { type: string }
        yearReleased: { type: integer }
        themeId: { type: string, format: uuid }
        themeName: { type: string }
        externalThemeId: { type: integer }
        numberOfParts: { type: integer }
        imageUrl: { type: string }
        externalUrl: { type: string }
        source: { type: string }
        cacheStatus:
          type: string
          enum: [LOCAL_CACHE_HIT, IMPORTED_FROM_REBRICKABLE, EXTERNAL_SEARCH_RESULT]
    SetPartResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        setNumber: { type: string }
        partNumber: { type: string }
        partName: { type: string }
        partImageUrl: { type: string }
        colorExternalId: { type: integer }
        colorName: { type: string }
        colorRgb: { type: string }
        quantity: { type: integer }
        spare: { type: boolean }
    ImportSetRequest:
      type: object
      required: [setNumber]
      properties:
        setNumber: { type: string }
    InventoryImportResult:
      type: object
      properties:
        setNumber: { type: string }
        linesProcessed: { type: integer }
    MissingPartLine:
      type: object
      properties:
        partNumber: { type: string }
        partName: { type: string }
        partImageUrl: { type: string }
        colorExternalId: { type: integer }
        colorName: { type: string }
        colorRgb: { type: string }
        required: { type: integer }
        owned: { type: integer }
        missing: { type: integer }
    MissingPartsReport:
      type: object
      properties:
        setNumber: { type: string }
        totalRequired: { type: integer }
        totalOwned: { type: integer }
        totalMissing: { type: integer }
        completionPercentage: { type: number, format: double }
        missingLineCount: { type: integer }
        lines:
          type: array
          items: { $ref: "#/components/schemas/MissingPartLine" }
        page: { type: integer }
        size: { type: integer }
        totalLines: { type: integer, format: int64 }
        totalPages: { type: integer }
        first: { type: boolean }
        last: { type: boolean }
    AddUserSetRequest:
      type: object
      required: [setNumber]
      properties:
        setNumber: { type: string }
        status: { $ref: "#/components/schemas/CollectionStatus" }
        purchasePrice: { type: number }
        purchaseDate: { type: string, format: date }
    UpdateUserSetRequest:
      type: object
      properties:
        status: { $ref: "#/components/schemas/CollectionStatus" }
        purchasePrice: { type: number }
        purchaseDate: { type: string, format: date }
    UserSetResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        setNumber: { type: string }
        setName: { type: string }
        yearReleased: { type: integer }
        themeName: { type: string }
        imageUrl: { type: string }
        status: { $ref: "#/components/schemas/CollectionStatus" }
        purchasePrice: { type: number }
        purchaseDate: { type: string, format: date }
    AddUserPartRequest:
      type: object
      required: [externalPartNumber, colorExternalId, quantity]
      properties:
        externalPartNumber: { type: string }
        colorExternalId: { type: integer }
        quantity: { type: integer, minimum: 1 }
        storageLocation: { type: string }
    UpdateUserPartRequest:
      type: object
      properties:
        quantity: { type: integer, minimum: 1 }
        storageLocation: { type: string }
    UserPartResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        partNumber: { type: string }
        partName: { type: string }
        partImageUrl: { type: string }
        colorExternalId: { type: integer }
        colorName: { type: string }
        colorRgb: { type: string }
        quantity: { type: integer }
        storageLocation: { type: string }
    ThemeResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        externalId: { type: string }
        name: { type: string }
    CollectionStatus:
      type: string
      enum: [OWNED, WISHLIST, BUILT, IN_PROGRESS]
    PageBrickSetResponse:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          properties:
            content:
              type: array
              items: { $ref: "#/components/schemas/BrickSetResponse" }
    PageSetPartResponse:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          properties:
            content:
              type: array
              items: { $ref: "#/components/schemas/SetPartResponse" }
    PageUserSetResponse:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          properties:
            content:
              type: array
              items: { $ref: "#/components/schemas/UserSetResponse" }
    PageUserPartResponse:
      allOf:
        - $ref: "#/components/schemas/PageMeta"
        - type: object
          properties:
            content:
              type: array
              items: { $ref: "#/components/schemas/UserPartResponse" }
    PageMeta:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        first: { type: boolean }
        last: { type: boolean }
